{%extends 'Boutique/base.html'%}
{% block content %}
<h2>List des Clients</h2>
<table border="1">
    <tr><th>Nom</th><th>Localite</th><th>Compte</th></tr>
    {% for c in clients%}
    <tr>
        <td>
            <a href="{% url 'client_commandes' c.ncli %}">{{c.nom|upper}}</a>
        </td>
        <td>{{c.localite|capfirst}}</td>
        <td style="color:{%if c.compte < 0 %} red {%else%} green {%endif%}">{{c.compte}}DH</td>
    </tr>
    {% endfor %}
</table>
{% endblock %}
