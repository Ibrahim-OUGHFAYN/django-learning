{%extends 'Boutique/base.html'%}
{%block content%}
<h2>Stock produits</h2>
<ul>
    {%for p in produits%}
    <li>
        {{p.libelle|capfirst}}{ref:{{p.npre}}}-<strong>Stock:{{p.qstock}}</strong>
        {% if p.qstock < 100 %}<span style="color:red;">ALERTE</span>{%endif%}
    </li>
    {%endfor%}
</ul>
{%endblock%}
